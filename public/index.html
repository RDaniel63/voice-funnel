<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f172a">
<title>Voice Funnel</title>
<link rel="manifest" href="/manifest.json">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f172a;--surface:#1e293b;--surface2:#334155;--border:#475569;
  --text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;
  --accent:#3b82f6;--accent2:#2563eb;--green:#22c55e;--yellow:#eab308;
  --red:#ef4444;--purple:#a855f7;--orange:#f97316;
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
#root{height:100%}
.app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto;position:relative}
.header{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--surface2);background:var(--bg);z-index:10}
.header h1{font-size:18px;font-weight:700;letter-spacing:-0.5px}
.header-right{display:flex;gap:12px;align-items:center}
.header-btn{background:none;border:none;cursor:pointer;padding:4px;display:flex;align-items:center}
.tab-bar{display:flex;background:var(--surface);border-radius:10px;padding:3px;margin:12px 16px 8px;gap:2px}
.tab{flex:1;padding:8px 4px;text-align:center;font-size:11px;font-weight:600;border-radius:8px;cursor:pointer;transition:all .2s;color:var(--text2);position:relative}
.tab.active{background:var(--accent);color:#fff}
.tab .count{display:inline-block;background:var(--surface2);border-radius:10px;padding:0 6px;font-size:10px;margin-left:3px;min-width:16px}
.tab.active .count{background:rgba(255,255,255,.2)}
.domain-filter{display:flex;gap:6px;padding:0 16px 8px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.domain-chip{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;border:1px solid var(--surface2);color:var(--text2);transition:all .15s}
.domain-chip.active{border-color:var(--accent);color:var(--accent);background:rgba(59,130,246,.1)}
.content{flex:1;overflow-y:auto;padding:0 16px 110px;-webkit-overflow-scrolling:touch}
.capture-btn-wrap{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:100;display:flex;align-items:center;gap:12px}
.capture-btn{width:68px;height:68px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;box-shadow:0 4px 20px rgba(59,130,246,.4)}
.capture-btn.idle{background:var(--accent)}
.capture-btn.recording{background:var(--red);animation:pulse 1.5s infinite}
.capture-btn.processing{background:var(--yellow);cursor:wait;animation:none}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.4)}50%{box-shadow:0 0 0 16px rgba(239,68,68,0)}}
.capture-btn svg{width:28px;height:28px;fill:#fff}
.recording-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(15,23,42,.97);z-index:90;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.recording-overlay .waveform{display:flex;align-items:center;gap:3px;height:40px;margin-bottom:12px}
.recording-overlay .waveform .bar{width:4px;background:var(--red);border-radius:2px;animation:wave 1s ease-in-out infinite}
.recording-overlay .waveform .bar:nth-child(2){animation-delay:.1s}
.recording-overlay .waveform .bar:nth-child(3){animation-delay:.2s}
.recording-overlay .waveform .bar:nth-child(4){animation-delay:.3s}
.recording-overlay .waveform .bar:nth-child(5){animation-delay:.4s}
@keyframes wave{0%,100%{height:8px}50%{height:32px}}
.recording-overlay .timer{font-size:48px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--red);margin-bottom:4px}
.recording-overlay .status{font-size:14px;color:var(--text2);margin-bottom:20px}
.recording-overlay .actions{display:flex;gap:12px}
.recording-overlay .actions button{padding:14px 28px;border-radius:12px;border:none;font-size:16px;font-weight:600;cursor:pointer}
.btn-cancel{background:var(--surface2);color:var(--text)}
.btn-save{background:var(--green);color:#fff}
.processing-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(15,23,42,.97);z-index:90;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.processing-overlay .spinner{width:48px;height:48px;border:4px solid var(--surface2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}
.processing-overlay .step{font-size:14px;color:var(--text2);margin-top:8px}
.task-card{background:var(--surface);border-radius:12px;padding:14px;margin-bottom:10px;border-left:3px solid transparent;transition:all .2s}
.task-card.priority-1{border-left-color:var(--red)}
.task-card.priority-2{border-left-color:var(--yellow)}
.task-card.starred{border-left-color:var(--green);background:linear-gradient(135deg,rgba(34,197,94,.05),var(--surface))}
.task-card .task-header{display:flex;align-items:flex-start;gap:10px}
.task-card .checkbox{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:1px}
.task-card .checkbox.checked{background:var(--green);border-color:var(--green)}
.task-card .checkbox.in-progress{border-color:var(--yellow);background:rgba(234,179,8,.15)}
.task-card .checkbox svg{width:14px;height:14px;fill:#fff;opacity:0;transition:opacity .15s}
.task-card .checkbox.checked svg{opacity:1}
.task-card .task-body{flex:1;min-width:0}
.task-card .task-title{font-size:15px;line-height:1.4;font-weight:500}
.task-card .task-title.completed{text-decoration:line-through;color:var(--text3)}
.task-card .star-btn{background:none;border:none;cursor:pointer;font-size:18px;padding:2px;flex-shrink:0;opacity:.3;transition:opacity .15s}
.task-card .star-btn.active{opacity:1}
.task-card .task-meta{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;align-items:center}
.tag{padding:2px 8px;border-radius:6px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.tag-task{background:rgba(59,130,246,.15);color:var(--accent)}
.tag-idea{background:rgba(168,85,247,.15);color:var(--purple)}
.tag-project{background:rgba(249,115,22,.15);color:var(--orange)}
.tag-urgent{background:rgba(239,68,68,.2);color:var(--red)}
.tag-someday{background:rgba(100,116,139,.2);color:var(--text3)}
.tag-meridian{background:rgba(59,130,246,.1);color:var(--accent)}
.tag-ministry{background:rgba(168,85,247,.1);color:var(--purple)}
.tag-personal{background:rgba(34,197,94,.1);color:var(--green)}
.tag-admin{background:rgba(234,179,8,.1);color:var(--yellow)}
.task-card .task-actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.task-card .task-actions button{padding:4px 10px;border-radius:6px;border:1px solid var(--surface2);background:transparent;color:var(--text2);font-size:11px;cursor:pointer;transition:all .15s}
.task-card .task-actions button:active{background:var(--surface2);color:var(--text)}
.task-card .task-actions button.danger:active{background:rgba(239,68,68,.15);color:var(--red)}
.task-card .timestamp{font-size:11px;color:var(--text3);margin-top:4px}
.task-card .transcript-peek{font-size:11px;color:var(--text3);margin-top:4px;cursor:pointer;max-height:36px;overflow:hidden;line-height:1.4}
.task-card .transcript-peek.expanded{max-height:none}
.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:14px;line-height:1.6}
.ai-suggest{background:linear-gradient(135deg,rgba(168,85,247,.08),rgba(59,130,246,.08));border:1px solid rgba(168,85,247,.2);border-radius:10px;padding:12px;margin-bottom:12px}
.ai-suggest .ai-label{font-size:11px;font-weight:700;color:var(--purple);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.ai-suggest p{font-size:13px;color:var(--text2);line-height:1.4;margin:0}
.ai-suggest .btn-row{display:flex;gap:6px;margin-top:8px}
.ai-suggest button{padding:6px 12px;border-radius:6px;border:none;font-size:12px;font-weight:600;cursor:pointer}
.eps-banner{background:linear-gradient(135deg,rgba(34,197,94,.1),rgba(59,130,246,.08));border:1px solid rgba(34,197,94,.2);border-radius:10px;padding:12px;margin-bottom:12px}
.eps-banner h3{font-size:13px;font-weight:700;color:var(--green);margin-bottom:4px}
.eps-banner p{font-size:12px;color:var(--text2);line-height:1.5;margin:0}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--surface);border-radius:16px 16px 0 0;width:100%;max-width:480px;max-height:80vh;overflow-y:auto;padding:20px}
.modal h2{font-size:18px;font-weight:700;margin-bottom:16px}
.modal .field{margin-bottom:14px}
.modal label{font-size:12px;color:var(--text2);display:block;margin-bottom:4px;font-weight:600}
.modal input,.modal textarea,.modal select{width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--surface2);background:var(--bg);color:var(--text);font-size:14px;font-family:inherit}
.modal textarea{resize:vertical;min-height:60px}
.modal .btn-row{display:flex;gap:8px;margin-top:16px}
.modal .btn-row button{flex:1;padding:12px;border-radius:10px;border:none;font-weight:600;cursor:pointer;font-size:14px}
.search-bar{margin:0 0 8px;position:relative}
.search-bar input{width:100%;padding:10px 12px 10px 36px;border-radius:10px;border:1px solid var(--surface2);background:var(--surface);color:var(--text);font-size:14px}
.search-bar svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:16px;height:16px;fill:var(--text3)}
.notification{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:10px 20px;border-radius:10px;font-size:14px;font-weight:600;z-index:300;animation:slideDown .3s ease}
.notification.error{background:var(--red)}
@keyframes slideDown{from{opacity:0;transform:translateX(-50%) translateY(-20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
</style>
</head>
<body>
<div id="root"></div>
<script>if('serviceWorker' in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('/sw.js').catch(()=>{}));</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const API = '';  // Same origin

// ──── API CALLS ────
async function api(path, opts = {}) {
  const res = await fetch(API + path, {
    headers: opts.body instanceof FormData ? {} : { 'Content-Type': 'application/json' },
    ...opts,
    body: opts.body instanceof FormData ? opts.body : opts.body ? JSON.stringify(opts.body) : undefined
  });
  if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error || 'Request failed'); }
  return res.json();
}

// ──── ICONS ────
const MicIcon = () => <svg viewBox="0 0 24 24" style={{width:28,height:28,fill:'#fff'}}><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>;
const StopIcon = () => <svg viewBox="0 0 24 24" style={{width:28,height:28,fill:'#fff'}}><rect x="6" y="6" width="12" height="12" rx="2"/></svg>;
const SearchSvg = () => <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>;

function App() {
  const [tasks, setTasks] = useState([]);
  const [activeTab, setActiveTab] = useState('today');
  const [domainFilter, setDomainFilter] = useState('all');
  const [searchQuery, setSearchQuery] = useState('');
  const [isRecording, setIsRecording] = useState(false);
  const [isProcessing, setIsProcessing] = useState(false);
  const [processingStep, setProcessingStep] = useState('');
  const [recordingTime, setRecordingTime] = useState(0);
  const [notification, setNotification] = useState(null);
  const [editingItem, setEditingItem] = useState(null);
  const [expandedTranscript, setExpandedTranscript] = useState(null);
  const [loading, setLoading] = useState(true);

  const mediaRecorderRef = useRef(null);
  const audioChunksRef = useRef([]);
  const timerRef = useRef(null);

  const notify = (msg, isError = false) => {
    setNotification({ msg, isError });
    setTimeout(() => setNotification(null), 2500);
  };

  // ──── LOAD TASKS ────
  const loadTasks = useCallback(async () => {
    try {
      const { tasks: data } = await api('/api/tasks');
      setTasks(data || []);
    } catch (err) {
      console.error('Load failed:', err);
      notify('Failed to load tasks', true);
    } finally { setLoading(false); }
  }, []);

  useEffect(() => { loadTasks(); }, [loadTasks]);

  // ──── VOICE RECORDING (MediaRecorder → Whisper) ────
  const startRecording = useCallback(async () => {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true } });
      const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus'
        : MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4' : 'audio/webm';
      const recorder = new MediaRecorder(stream, { mimeType });
      audioChunksRef.current = [];

      recorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunksRef.current.push(e.data); };
      recorder.start(1000); // chunk every second
      mediaRecorderRef.current = recorder;
      setIsRecording(true);
      setRecordingTime(0);
      timerRef.current = setInterval(() => setRecordingTime(t => t + 1), 1000);
    } catch (err) {
      notify('Microphone access denied', true);
    }
  }, []);

  const stopAndProcess = useCallback(async () => {
    if (!mediaRecorderRef.current) return;

    // Stop recording
    const recorder = mediaRecorderRef.current;
    clearInterval(timerRef.current);
    setIsRecording(false);

    // Request final data chunk and wait for stop event
    recorder.stop();
    await new Promise(r => { recorder.onstop = r; });

    // NOW it's safe to release the microphone
    recorder.stream.getTracks().forEach(t => t.stop());
    const blob = new Blob(audioChunksRef.current, { type: recorder.mimeType });
    if (blob.size < 1000) { notify('Recording too short', true); return; }

    // Send to server pipeline
    setIsProcessing(true);
    setProcessingStep('Transcribing with Whisper...');
    try {
      const formData = new FormData();
      formData.append('audio', blob, 'recording.webm');

      setProcessingStep('Sending to Whisper...');
      const { transcript, items, count } = await api('/api/capture', { method: 'POST', body: formData });

      setProcessingStep('');
      setIsProcessing(false);
      await loadTasks();
      notify(`${count} item${count !== 1 ? 's' : ''} captured from voice`);
    } catch (err) {
      setIsProcessing(false);
      setProcessingStep('');
      notify('Processing failed: ' + err.message, true);
    }
  }, [loadTasks]);

  const cancelRecording = useCallback(() => {
    if (mediaRecorderRef.current) {
      mediaRecorderRef.current.stop();
      mediaRecorderRef.current.stream.getTracks().forEach(t => t.stop());
    }
    clearInterval(timerRef.current);
    setIsRecording(false);
    audioChunksRef.current = [];
  }, []);

  const formatTime = (s) => `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;

  // ──── TASK OPERATIONS ────
  const cycleStatus = async (task) => {
    const next = task.status === 'not_started' ? 'in_progress' : task.status === 'in_progress' ? 'completed' : 'not_started';
    try {
      await api(`/api/tasks/${task.id}`, { method: 'PATCH', body: { status: next } });
      setTasks(prev => prev.map(t => t.id === task.id ? { ...t, status: next } : t));
    } catch (err) { notify('Update failed', true); }
  };

  const moveFunnel = async (id, funnel) => {
    try {
      await api(`/api/tasks/${id}`, { method: 'PATCH', body: { funnel } });
      setTasks(prev => prev.map(t => t.id === id ? { ...t, funnel } : t));
      notify(`Moved to ${funnel === 'today' ? "Today's Focus" : funnel === 'active' ? 'Active' : 'Inbox'}`);
    } catch (err) { notify('Move failed', true); }
  };

  const starTask = async (id) => {
    try {
      await api(`/api/tasks/${id}/star`, { method: 'POST' });
      setTasks(prev => prev.map(t => ({ ...t, is_starred: t.id === id })));
      notify('Starred as THE ONE');
    } catch (err) { notify('Star failed', true); }
  };

  const removeTask = async (id) => {
    try {
      await api(`/api/tasks/${id}`, { method: 'DELETE' });
      setTasks(prev => prev.filter(t => t.id !== id));
    } catch (err) { notify('Delete failed', true); }
  };

  const saveEdit = async () => {
    if (!editingItem) return;
    try {
      await api(`/api/tasks/${editingItem.id}`, { method: 'PATCH', body: {
        text: editingItem.text,
        priority_level: editingItem.priority_level,
        funnel: editingItem.funnel,
        status: editingItem.status,
        domain: editingItem.domain
      }});
      setTasks(prev => prev.map(t => t.id === editingItem.id ? { ...t, ...editingItem } : t));
      setEditingItem(null);
      notify('Updated');
    } catch (err) { notify('Save failed', true); }
  };

  // ──── FILTERING ────
  const getFiltered = () => {
    let filtered = tasks;
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      filtered = filtered.filter(i => i.text?.toLowerCase().includes(q) || i.original_transcript?.toLowerCase().includes(q));
    }
    if (domainFilter !== 'all') {
      filtered = filtered.filter(i => i.domain === domainFilter);
    }
    switch (activeTab) {
      case 'today': return filtered.filter(i => i.funnel === 'today' && i.status !== 'completed').sort((a,b) => {
        if (a.is_starred && !b.is_starred) return -1;
        if (!a.is_starred && b.is_starred) return 1;
        return (a.priority_level||3) - (b.priority_level||3);
      });
      case 'active': return filtered.filter(i => (i.funnel === 'active' || i.funnel === 'today') && i.status !== 'completed');
      case 'all': return filtered.filter(i => i.status !== 'completed');
      case 'done': return filtered.filter(i => i.status === 'completed');
      default: return filtered;
    }
  };

  const counts = {
    today: tasks.filter(i => i.funnel === 'today' && i.status !== 'completed').length,
    active: tasks.filter(i => (i.funnel === 'active' || i.funnel === 'today') && i.status !== 'completed').length,
    all: tasks.filter(i => i.status !== 'completed').length,
    done: tasks.filter(i => i.status === 'completed').length
  };

  const starred = tasks.find(t => t.is_starred && t.status !== 'completed');

  // ──── AI SUGGESTIONS ────
  const getSuggestion = () => {
    if (activeTab !== 'all') return null;
    const inbox = tasks.filter(i => i.funnel === 'all' && i.status !== 'completed');
    const urgent = inbox.filter(i => (i.priority_level || 3) <= 2 || i.tags?.includes('urgent'));
    if (urgent.length > 0) return { items: urgent, msg: `${urgent.length} urgent item${urgent.length > 1 ? 's' : ''} in inbox — move to Today?` };
    if (inbox.length >= 5) return { items: inbox.slice(0, 3), msg: `${inbox.length} items in inbox need triage. Start with the top 3?` };
    return null;
  };

  const suggestion = getSuggestion();
  const filteredItems = getFiltered();

  const priorityLabel = { 1: '🔴', 2: '🟡', 3: '🔵', 4: '⚪' };
  const domainLabel = { meridian: '🏢', ministry: '⛪', personal: '🏃', admin: '📋' };

  // ──── RENDER ────
  return (
    <div className="app">
      {notification && <div className={`notification ${notification.isError?'error':''}`}>{notification.msg}</div>}

      <div className="header">
        <h1>Voice Funnel</h1>
        <div className="header-right">
          <span style={{fontSize:11,color:'var(--text3)'}}>v2 · AI + Cloud</span>
        </div>
      </div>

      <div className="tab-bar">
        {[
          {key:'today',label:'Today',count:counts.today},
          {key:'active',label:'Active',count:counts.active},
          {key:'all',label:'Inbox',count:counts.all},
          {key:'done',label:'Done',count:counts.done}
        ].map(tab => (
          <div key={tab.key} className={`tab ${activeTab===tab.key?'active':''}`} onClick={()=>setActiveTab(tab.key)}>
            {tab.label}<span className="count">{tab.count}</span>
          </div>
        ))}
      </div>

      <div className="domain-filter">
        {[{k:'all',l:'All'},{k:'meridian',l:'🏢 Meridian'},{k:'ministry',l:'⛪ Ministry'},{k:'personal',l:'🏃 Personal'},{k:'admin',l:'📋 Admin'}].map(d => (
          <div key={d.k} className={`domain-chip ${domainFilter===d.k?'active':''}`} onClick={()=>setDomainFilter(d.k)}>{d.l}</div>
        ))}
      </div>

      <div className="content">
        <div className="search-bar">
          <SearchSvg />
          <input placeholder="Search tasks..." value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} />
        </div>

        {/* EPS Banner — Today view */}
        {activeTab === 'today' && starred && (
          <div className="eps-banner">
            <h3>⭐ THE ONE THING</h3>
            <p>{starred.text}</p>
          </div>
        )}

        {activeTab === 'today' && counts.today > 0 && !starred && (
          <div className="eps-banner" style={{borderColor:'rgba(234,179,8,.3)',background:'linear-gradient(135deg,rgba(234,179,8,.08),rgba(234,179,8,.02))'}}>
            <h3 style={{color:'var(--yellow)'}}>No task starred</h3>
            <p>Tap the ⭐ on your most important task to set THE ONE for today.</p>
          </div>
        )}

        {/* AI Suggestion */}
        {suggestion && (
          <div className="ai-suggest">
            <div className="ai-label">AI Suggestion</div>
            <p>{suggestion.msg}</p>
            <div className="btn-row">
              <button style={{background:'var(--purple)',color:'#fff'}} onClick={async () => {
                for (const item of suggestion.items) await moveFunnel(item.id, 'today');
              }}>Move to Today</button>
              <button style={{background:'var(--surface2)',color:'var(--text)'}}>Dismiss</button>
            </div>
          </div>
        )}

        {/* Task List */}
        {loading ? (
          <div className="empty-state"><div className="icon">⏳</div><p>Loading...</p></div>
        ) : filteredItems.length === 0 ? (
          <div className="empty-state">
            <div className="icon">{activeTab==='today'?'🎯':activeTab==='done'?'✅':'🧠'}</div>
            <p>{activeTab==='today'?'No tasks in Today\'s Focus yet.\nCapture a voice note or promote from Inbox.':activeTab==='done'?'No completed tasks yet.':'Your brain dump is empty.\nTap the mic and start talking.'}</p>
          </div>
        ) : filteredItems.map(task => (
          <div className={`task-card priority-${task.priority_level} ${task.is_starred?'starred':''}`} key={task.id}>
            <div className="task-header">
              <div
                className={`checkbox ${task.status==='completed'?'checked':task.status==='in_progress'?'in-progress':''}`}
                onClick={()=>cycleStatus(task)}
              >
                {task.status==='completed' && <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>}
                {task.status==='in_progress' && <span style={{color:'var(--yellow)',fontSize:12,fontWeight:700}}>●</span>}
              </div>
              <div className="task-body" onClick={()=>setEditingItem({...task})}>
                <div className={`task-title ${task.status==='completed'?'completed':''}`}>{task.text}</div>
                <div className="task-meta">
                  {task.domain && <span className={`tag tag-${task.domain}`}>{domainLabel[task.domain]} {task.domain}</span>}
                  {task.tags?.filter(t=>!['task','meridian','ministry','personal','admin'].includes(t)).map(tag => <span key={tag} className={`tag tag-${tag}`}>{tag}</span>)}
                  {task.deadline && <span className="tag" style={{background:'rgba(234,179,8,.12)',color:'var(--yellow)'}}>📅 {task.deadline}</span>}
                </div>
              </div>
              <button className={`star-btn ${task.is_starred?'active':''}`} onClick={()=>starTask(task.id)}>
                {task.is_starred ? '⭐' : '☆'}
              </button>
            </div>
            {task.original_transcript && task.original_transcript !== task.text && (
              <div className={`transcript-peek ${expandedTranscript===task.id?'expanded':''}`}
                onClick={()=>setExpandedTranscript(expandedTranscript===task.id?null:task.id)}>
                🎙 "{task.original_transcript}"
              </div>
            )}
            <div className="task-actions">
              {task.funnel !== 'today' && <button onClick={()=>moveFunnel(task.id,'today')}>→ Today</button>}
              {task.funnel !== 'active' && <button onClick={()=>moveFunnel(task.id,'active')}>→ Active</button>}
              {task.funnel !== 'all' && <button onClick={()=>moveFunnel(task.id,'all')}>→ Inbox</button>}
              <button className="danger" onClick={()=>removeTask(task.id)}>Remove</button>
            </div>
            <div className="timestamp">
              {new Date(task.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})}
            </div>
          </div>
        ))}
      </div>

      {/* CAPTURE BUTTON */}
      {!isRecording && !isProcessing && (
        <div className="capture-btn-wrap">
          <button className="capture-btn idle" onClick={startRecording}><MicIcon /></button>
        </div>
      )}

      {/* RECORDING OVERLAY */}
      {isRecording && (
        <div className="recording-overlay">
          <div className="waveform">
            <div className="bar"></div><div className="bar"></div><div className="bar"></div><div className="bar"></div><div className="bar"></div>
          </div>
          <div className="timer">{formatTime(recordingTime)}</div>
          <div className="status">Listening — speak freely, tap Save when done</div>
          <div className="actions">
            <button className="btn-cancel" onClick={cancelRecording}>Cancel</button>
            <button className="btn-save" onClick={stopAndProcess}>Save & Process</button>
          </div>
        </div>
      )}

      {/* PROCESSING OVERLAY */}
      {isProcessing && (
        <div className="processing-overlay">
          <div className="spinner"></div>
          <div style={{fontSize:18,fontWeight:600}}>Processing your voice note</div>
          <div className="step">{processingStep || 'Analyzing with AI...'}</div>
        </div>
      )}

      {/* EDIT MODAL */}
      {editingItem && (
        <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)setEditingItem(null)}}>
          <div className="modal">
            <h2>Edit Item</h2>
            <div className="field">
              <label>Task</label>
              <textarea value={editingItem.text||''} onChange={e=>setEditingItem({...editingItem,text:e.target.value})} />
            </div>
            <div style={{display:'flex',gap:8}}>
              <div className="field" style={{flex:1}}>
                <label>Priority</label>
                <select value={editingItem.priority_level||3} onChange={e=>setEditingItem({...editingItem,priority_level:parseInt(e.target.value)})}>
                  <option value="1">🔴 Urgent</option>
                  <option value="2">🟡 High</option>
                  <option value="3">🔵 Normal</option>
                  <option value="4">⚪ Low</option>
                </select>
              </div>
              <div className="field" style={{flex:1}}>
                <label>Domain</label>
                <select value={editingItem.domain||'meridian'} onChange={e=>setEditingItem({...editingItem,domain:e.target.value})}>
                  <option value="meridian">🏢 Meridian</option>
                  <option value="ministry">⛪ Ministry</option>
                  <option value="personal">🏃 Personal</option>
                  <option value="admin">📋 Admin</option>
                </select>
              </div>
            </div>
            <div style={{display:'flex',gap:8}}>
              <div className="field" style={{flex:1}}>
                <label>Funnel</label>
                <select value={editingItem.funnel||'all'} onChange={e=>setEditingItem({...editingItem,funnel:e.target.value})}>
                  <option value="today">Today's Focus</option>
                  <option value="active">Active</option>
                  <option value="all">Inbox</option>
                </select>
              </div>
              <div className="field" style={{flex:1}}>
                <label>Status</label>
                <select value={editingItem.status||'not_started'} onChange={e=>setEditingItem({...editingItem,status:e.target.value})}>
                  <option value="not_started">Not Started</option>
                  <option value="in_progress">In Progress</option>
                  <option value="completed">Completed</option>
                </select>
              </div>
            </div>
            {editingItem.original_transcript && (
              <div className="field">
                <label>Original Voice Note</label>
                <div style={{background:'var(--bg)',borderRadius:8,padding:10,fontSize:13,color:'var(--text3)',lineHeight:1.5}}>
                  🎙 {editingItem.original_transcript}
                </div>
              </div>
            )}
            <div className="btn-row">
              <button style={{background:'var(--surface2)',color:'var(--text)'}} onClick={()=>setEditingItem(null)}>Cancel</button>
              <button style={{background:'var(--accent)',color:'#fff'}} onClick={saveEdit}>Save</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
